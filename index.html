<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Ghostito</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --ghost-blue: #7ecfff;
      --ghost-gold: #f0c060;
      --ghost-dark: #05040f;
      --ghost-mid:  #0e0b2a;
      --ghost-glow: rgba(126,207,255,0.18);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width:100%; height:100%;
      background: var(--ghost-dark);
      overflow: hidden;
      touch-action: none;
    }

    /* ── Loading ── */
    #loading {
      position: fixed; inset:0;
      background: var(--ghost-dark);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px; z-index: 100;
    }
    #loading h1 {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2rem, 6vw, 3.5rem);
      color: var(--ghost-blue);
      letter-spacing: 0.12em;
      text-shadow: 0 0 40px rgba(126,207,255,0.5);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100%{ opacity:1; } 50%{ opacity:0.6; }
    }
    #loadWrap {
      width: min(340px, 80vw);
    }
    #loadBar {
      width:100%; height:4px;
      background: rgba(126,207,255,0.15);
      border-radius:2px; overflow:hidden;
    }
    #loadFill {
      height:100%;
      background: linear-gradient(90deg, var(--ghost-blue), var(--ghost-gold));
      width:0%; transition: width 0.25s ease;
      border-radius:2px;
    }
    #loadText {
      font-family: 'Crimson Pro', serif;
      font-size: 0.9rem;
      color: rgba(126,207,255,0.5);
      text-align:center;
      margin-top:10px;
      letter-spacing:0.06em;
    }

    /* ── Canvas wrapper ── */
    #wrapper {
      width:100%; height:100%;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
    }
    #gameCanvas {
      display:block;
      max-width:100vw;
      max-height:100vh;
      image-rendering: pixelated;
    }

    /* ── HUD ── */
    #hud {
      position: fixed; top:0; left:0; right:0;
      padding: 10px 18px;
      display: flex; justify-content: space-between; align-items: center;
      pointer-events: none;
      z-index: 10;
    }
    .hud-pill {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(0.55rem, 2vw, 0.8rem);
      color: var(--ghost-blue);
      background: rgba(5,4,15,0.75);
      border: 1px solid rgba(126,207,255,0.25);
      border-radius: 20px;
      padding: 5px 14px;
      letter-spacing: 0.06em;
      backdrop-filter: blur(4px);
    }
    #hearts { display:flex; gap:4px; align-items:center; }
    .heart {
      width:18px; height:18px;
      transition: transform 0.2s;
    }
    .heart.lost { opacity:0.2; }

    /* ── Mobile controls ── */
    #mobileControls {
      position: fixed; bottom:0; left:0; right:0;
      height: 160px;
      display: none;
      pointer-events: none;
      z-index: 20;
      padding: 0 16px 16px;
      align-items: flex-end;
      justify-content: space-between;
    }
    #mobileControls.visible { display: flex; }

    /* D-pad izquierdo */
    #dpad {
      position: relative;
      width: 130px; height: 130px;
      pointer-events: all;
    }
    .dpad-btn {
      position: absolute;
      background: rgba(126,207,255,0.12);
      border: 1.5px solid rgba(126,207,255,0.3);
      border-radius: 10px;
      display: flex; align-items:center; justify-content:center;
      color: var(--ghost-blue);
      font-size: 1.3rem;
      user-select: none;
      -webkit-user-select: none;
      cursor: pointer;
      transition: background 0.08s;
      backdrop-filter: blur(3px);
    }
    .dpad-btn:active, .dpad-btn.pressed {
      background: rgba(126,207,255,0.28);
      border-color: rgba(126,207,255,0.7);
    }
    #btnLeft  { left:0;   top:43px; width:43px; height:44px; }
    #btnRight { right:0;  top:43px; width:43px; height:44px; }
    #btnUp    { left:43px; top:0;   width:44px; height:43px; }
    #btnDown  { left:43px; bottom:0; width:44px; height:43px; }
    #dpadCenter {
      position:absolute; left:43px; top:43px;
      width:44px; height:44px;
      background: rgba(126,207,255,0.06);
      border-radius:8px;
    }

    /* Botones de acción derecha */
    #actionBtns {
      display: flex; flex-direction:column;
      gap: 10px; align-items:flex-end;
      pointer-events: all;
    }
    #actionRow1, #actionRow2 { display:flex; gap:10px; }

    .action-btn {
      width: 58px; height: 58px;
      border-radius: 50%;
      border: 1.5px solid rgba(240,192,96,0.4);
      background: rgba(240,192,96,0.1);
      color: var(--ghost-gold);
      font-family: 'Cinzel Decorative', serif;
      font-size: 0.55rem;
      letter-spacing: 0.04em;
      display: flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:2px;
      user-select:none; -webkit-user-select:none;
      cursor:pointer;
      backdrop-filter: blur(3px);
      transition: background 0.08s, border-color 0.08s, transform 0.08s;
      pointer-events: all;
    }
    .action-btn .btn-icon { font-size: 1.2rem; line-height:1; }
    .action-btn:active, .action-btn.pressed {
      background: rgba(240,192,96,0.28);
      border-color: rgba(240,192,96,0.8);
      transform: scale(0.93);
    }
    #btnJump  { border-color: rgba(126,207,255,0.5); background: rgba(126,207,255,0.1); color: var(--ghost-blue); }
    #btnJump:active, #btnJump.pressed { background: rgba(126,207,255,0.28); border-color: var(--ghost-blue); }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <h1>GHOSTITO</h1>
  <div id="loadWrap">
    <div id="loadBar"><div id="loadFill"></div></div>
    <p id="loadText">Invocando espíritus...</p>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="hearts"></div>
  <div class="hud-pill" id="scoreEl">Espectros: 0 / 20</div>
</div>

<!-- Canvas -->
<div id="wrapper">
  <canvas id="gameCanvas"></canvas>
</div>

<!-- Controles móvil -->
<div id="mobileControls">
  <div id="dpad">
    <div class="dpad-btn" id="btnLeft">◀</div>
    <div class="dpad-btn" id="btnRight">▶</div>
    <div class="dpad-btn" id="btnUp">▲</div>
    <div class="dpad-btn" id="btnDown">▼</div>
    <div id="dpadCenter"></div>
  </div>
  <div id="actionBtns">
    <div id="actionRow1">
      <div class="action-btn" id="btnJump"><span class="btn-icon">↑</span>Saltar</div>
      <div class="action-btn" id="btnDash"><span class="btn-icon">⚡</span>Dash</div>
    </div>
    <div id="actionRow2">
      <div class="action-btn" id="btnAttack"><span class="btn-icon">⚔</span>Atacar</div>
      <div class="action-btn" id="btnDesc"><span class="btn-icon">👻</span>Desc.</div>
    </div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
