<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Ghostito — La Travesía del Alma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --blue:  #7ecfff;
      --gold:  #f0c060;
      --dark:  #03020c;
      --mid:   #0a0820;
      --glow:  rgba(126,207,255,0.2);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%;
      background: var(--dark);
      overflow: hidden;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Loading ── */
    #loading {
      position:fixed; inset:0;
      background:var(--dark);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      gap:32px; z-index:200;
      transition: opacity 0.8s ease;
    }
    #loading h1 {
      font-family:'Cinzel Decorative',serif;
      font-size: clamp(1.8rem,5vw,3rem);
      color: var(--blue);
      letter-spacing:0.14em;
      text-shadow: 0 0 50px rgba(126,207,255,0.6);
      animation: breathe 2.5s ease-in-out infinite;
    }
    #loading p {
      font-family:'Crimson Pro',serif;
      font-size:clamp(0.8rem,2vw,1rem);
      color:rgba(126,207,255,0.4);
      letter-spacing:0.1em;
      font-style:italic;
    }
    @keyframes breathe { 0%,100%{opacity:1} 50%{opacity:0.5} }
    #loadBar { width:min(320px,70vw); height:3px; background:rgba(126,207,255,0.1); border-radius:2px; overflow:hidden; }
    #loadFill { height:100%; width:0%; background:linear-gradient(90deg,var(--blue),var(--gold)); transition:width 0.3s; }

    /* ── Canvas ── */
    #wrap { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
    #gc { display:block; max-width:100vw; max-height:100vh; }

    /* ── HUD ── */
    #hud {
      position:fixed; top:0; left:0; right:0;
      padding:10px 16px;
      display:flex; justify-content:space-between; align-items:center;
      pointer-events:none; z-index:30;
    }
    .hud-pill {
      font-family:'Cinzel Decorative',serif;
      font-size:clamp(0.45rem,1.6vw,0.72rem);
      color:var(--blue);
      background:rgba(3,2,12,0.8);
      border:1px solid rgba(126,207,255,0.2);
      border-radius:20px;
      padding:5px 13px;
      letter-spacing:0.05em;
      backdrop-filter:blur(6px);
    }
    #hearts { display:flex; gap:5px; align-items:center; }
    .heart { width:17px; height:17px; transition:transform 0.15s; }
    .heart.lost { opacity:0.15; }

    /* Barra de luz primordial */
    #lightBar {
      display:flex; align-items:center; gap:8px;
    }
    #lightLabel {
      font-family:'Cinzel Decorative',serif;
      font-size:clamp(0.4rem,1.3vw,0.6rem);
      color:var(--gold);
      letter-spacing:0.05em;
    }
    #lightContainer {
      width:clamp(60px,10vw,120px); height:8px;
      background:rgba(240,192,96,0.1);
      border:1px solid rgba(240,192,96,0.3);
      border-radius:4px; overflow:hidden;
    }
    #lightFill {
      height:100%; width:0%;
      background:linear-gradient(90deg,#f0c060,#ffffff);
      border-radius:4px;
      transition:width 0.4s cubic-bezier(.2,.8,.4,1);
      box-shadow: 0 0 8px rgba(240,192,96,0.6);
    }
    #levelEl { font-family:'Cinzel Decorative',serif; font-size:clamp(0.45rem,1.5vw,0.7rem); color:var(--gold); }

    /* ── Mobile controls ── */
    #mc {
      position:fixed; bottom:0; left:0; right:0;
      height:170px;
      display:none;
      pointer-events:none;
      z-index:40;
      padding:0 14px 14px;
      align-items:flex-end;
      justify-content:space-between;
    }
    #mc.on { display:flex; }

    /* D-pad */
    #dpad { position:relative; width:136px; height:136px; pointer-events:all; }
    .dp {
      position:absolute;
      background:rgba(126,207,255,0.08);
      border:1.5px solid rgba(126,207,255,0.25);
      border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      color:var(--blue); font-size:1.1rem;
      user-select:none; -webkit-user-select:none;
      cursor:pointer;
      transition:background 0.07s;
    }
    .dp.pressed, .dp:active { background:rgba(126,207,255,0.25); border-color:rgba(126,207,255,0.7); }
    #dL { left:0;  top:46px; width:44px; height:44px; }
    #dR { right:0; top:46px; width:44px; height:44px; }
    #dU { left:46px; top:0;   width:44px; height:44px; }

    /* Botones acción */
    #abtn { display:flex; flex-direction:column; gap:8px; align-items:flex-end; pointer-events:all; }
    .row  { display:flex; gap:8px; }

    /* ZR arriba */
    #zrRow { display:flex; justify-content:flex-end; margin-bottom:2px; pointer-events:all; }
    #btnZR {
      font-family:'Cinzel Decorative',serif;
      font-size:0.5rem; letter-spacing:0.04em;
      padding:6px 18px;
      background:rgba(126,207,255,0.08);
      border:1.5px solid rgba(126,207,255,0.3);
      border-radius:20px;
      color:var(--blue);
      user-select:none; -webkit-user-select:none;
      cursor:pointer;
      pointer-events:all;
      transition:background 0.07s;
    }
    #btnZR.pressed, #btnZR:active { background:rgba(126,207,255,0.28); border-color:var(--blue); }

    .ab {
      width:56px; height:56px; border-radius:50%;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:1px;
      user-select:none; -webkit-user-select:none;
      cursor:pointer;
      transition:background 0.07s, transform 0.07s;
      pointer-events:all;
      font-family:'Cinzel Decorative',serif;
    }
    .ab .lbl { font-size:0.75rem; font-weight:700; line-height:1; }
    .ab .sub { font-size:0.38rem; letter-spacing:0.04em; opacity:0.8; }
    .ab:active, .ab.pressed { transform:scale(0.91); }

    /* Colores ABXY */
    #btnY { background:rgba(255,160,30,0.1);  border:1.5px solid rgba(255,160,30,0.4);  color:#ffa01e; }
    #btnB { background:rgba(100,200,100,0.1); border:1.5px solid rgba(100,200,100,0.4); color:#64c864; }
    #btnA { background:rgba(220,80,80,0.1);   border:1.5px solid rgba(220,80,80,0.4);   color:#dc5050; }
    #btnX { background:rgba(126,207,255,0.1); border:1.5px solid rgba(126,207,255,0.4); color:var(--blue); }
    #btnY.pressed,#btnY:active { background:rgba(255,160,30,0.28); }
    #btnB.pressed,#btnB:active { background:rgba(100,200,100,0.28); }
    #btnA.pressed,#btnA:active { background:rgba(220,80,80,0.28); }
    #btnX.pressed,#btnX:active { background:rgba(126,207,255,0.28); }

    /* ── Diálogo ── */
    #dlg {
      position:fixed; inset:0;
      display:none; flex-direction:column;
      align-items:center; justify-content:flex-end;
      padding-bottom: clamp(180px,28vw,220px);
      z-index:50; pointer-events:none;
    }
    #dlg.on { display:flex; }
    #dlgBox {
      max-width:min(820px,88vw);
      background:rgba(3,2,12,0.88);
      border:1px solid rgba(126,207,255,0.25);
      border-radius:16px;
      padding:24px 32px 20px;
      pointer-events:all;
      backdrop-filter:blur(8px);
      animation: fadeUp 0.4s ease;
      text-align:center;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    #dlgSpeaker {
      font-family:'Cinzel Decorative',serif;
      font-size:clamp(0.55rem,1.8vw,0.8rem);
      color:var(--gold);
      letter-spacing:0.12em;
      margin-bottom:12px;
      text-shadow:0 0 20px rgba(240,192,96,0.5);
    }
    #dlgText {
      font-family:'Crimson Pro',serif;
      font-size:clamp(1rem,2.5vw,1.3rem);
      color:rgba(220,230,255,0.92);
      font-style:italic;
      line-height:1.65;
      letter-spacing:0.02em;
    }
    #dlgContinue {
      margin-top:16px;
      font-family:'Cinzel Decorative',serif;
      font-size:clamp(0.45rem,1.3vw,0.6rem);
      color:rgba(126,207,255,0.5);
      letter-spacing:0.12em;
      animation:breathe 1.8s ease-in-out infinite;
    }

    /* ── Flash ── */
    #flash {
      position:fixed; inset:0;
      background:rgba(255,255,255,0);
      pointer-events:none; z-index:60;
      transition:background 0.05s;
    }
  </style>
</head>
<body>

<div id="loading">
  <h1>GHOSTITO</h1>
  <div id="loadBar"><div id="loadFill"></div></div>
  <p id="loadTxt">Despertando en las sombras...</p>
</div>

<div id="hud">
  <div style="display:flex;gap:10px;align-items:center">
    <div id="hearts"></div>
    <div id="lightBar">
      <span id="lightLabel">LUZ</span>
      <div id="lightContainer"><div id="lightFill"></div></div>
    </div>
  </div>
  <div style="display:flex;gap:10px;align-items:center">
    <div class="hud-pill" id="levelEl">Nivel 1</div>
    <div class="hud-pill" id="scoreEl">0 / 5</div>
  </div>
</div>

<div id="wrap"><canvas id="gc"></canvas></div>

<!-- Diálogo -->
<div id="dlg">
  <div id="dlgBox">
    <div id="dlgSpeaker">✦ EL SER DE LUZ ✦</div>
    <div id="dlgText"></div>
    <div id="dlgContinue">— Toca o presiona cualquier tecla para continuar —</div>
  </div>
</div>

<!-- Flash de luz primordial -->
<div id="flash"></div>

<!-- Controles móvil -->
<div id="mc">
  <div id="dpad">
    <div class="dp" id="dL">◀</div>
    <div class="dp" id="dR">▶</div>
    <div class="dp" id="dU">▲</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;pointer-events:all">
    <div id="zrRow"><div class="ab" id="btnZR" style="border-radius:20px;width:auto;height:auto;padding:6px 18px;font-size:0.5rem;letter-spacing:0.04em;">ZR — DASH</div></div>
    <div id="abtn">
      <div class="row">
        <div class="ab" id="btnX"><span class="lbl">X</span><span class="sub">Luz</span></div>
        <div class="ab" id="btnY"><span class="lbl">Y</span><span class="sub">Atacar</span></div>
      </div>
      <div class="row">
        <div class="ab" id="btnA"><span class="lbl">A</span><span class="sub">Recoger</span></div>
        <div class="ab" id="btnB"><span class="lbl">B</span><span class="sub">Saltar</span></div>
      </div>
    </div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
